name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: false
      - run: go vet ./...
      - run: go test -race ./...

  release:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: false
      - name: Build release binaries
        env:
          CGO_ENABLED: "0"
        run: |
          mkdir -p dist
          GOOS=linux GOARCH=amd64 go build -trimpath -ldflags="-s -w" -o dist/code-init_linux_amd64 .
          GOOS=linux GOARCH=arm64 go build -trimpath -ldflags="-s -w" -o dist/code-init_linux_arm64 .
          GOOS=darwin GOARCH=amd64 go build -trimpath -ldflags="-s -w" -o dist/code-init_darwin_amd64 .
          GOOS=darwin GOARCH=arm64 go build -trimpath -ldflags="-s -w" -o dist/code-init_darwin_arm64 .
          GOOS=windows GOARCH=amd64 go build -trimpath -ldflags="-s -w" -o dist/code-init_windows_amd64.exe .
          GOOS=windows GOARCH=arm64 go build -trimpath -ldflags="-s -w" -o dist/code-init_windows_arm64.exe .
          cd dist
          sha256sum code-init_* > checksums.txt
      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${GITHUB_REF_NAME}" dist/* --verify-tag --generate-notes --title "code-init ${GITHUB_REF_NAME}"
